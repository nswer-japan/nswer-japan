<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;1,900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            background-color: #0d0d1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-image: url('header-image.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(0, 0, 0, 0.2); 
            background-blend-mode: overlay;
            height: 380px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: flex-start; 
            padding: 50px 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        
        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-weight: 900;
            margin: 0;
            font-size: 4em; 
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff; 
            text-shadow: 4px 4px 0px #ff007f, 6px 6px 15px rgba(0,0,0,0.9); 
        }
        header p {
            font-family: 'Noto Sans JP', sans-serif;
            margin-top: 15px;
            font-size: 1.2em;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 8px rgba(0,0,0,1); 
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff007f, #b388ff); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 3px solid #ff007f; 
            padding-bottom: 12px;
            margin-bottom: 40px;
            display: inline-block;
        }

        .about-box {
            background-color: #1a1a2e; 
            padding: 35px;
            border-radius: 10px; 
            border-left: 6px solid #b388ff; 
            margin-bottom: 70px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); 
        }
        .about-box p {
            margin: 0;
            font-size: 1.1em;
            color: #cccccc; 
            font-weight: 400; 
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
        }

        .card {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            background-color: #0d0d1a; 
            border: 2px solid #b388ff; 
            border-radius: 10px; 
            padding: 35px 25px;
            text-decoration: none;
            color: #ffffff; 
            text-align: center;
            font-weight: 700;
            font-size: 1.2em;
            letter-spacing: 1.5px;
            transition: all 0.4s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden; 
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff007f, #7b1fa2); 
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .card span {
            position: relative;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02); 
            border-color: #ff007f; 
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.6), 0 10px 50px rgba(123, 31, 162, 0.4); 
        }
        
        .card:hover::before {
            opacity: 1; 
        }

        /* ★★★ トップページのスマホ対応コード ★★★ */
        @media (max-width: 768px) {
            header {
                height: 280px; /* 画像の高さを少し抑える */
                padding: 30px 20px;
            }
            header h1 {
                font-size: 2.2em; /* 文字をスマホ画面に収める */
                letter-spacing: 1px;
                text-shadow: 3px 3px 0px #ff007f, 4px 4px 10px rgba(0,0,0,0.9);
            }
            header p {
                font-size: 0.9em;
            }
            .container {
                padding: 40px 15px;
            }
            .section-title {
                font-size: 1.8em;
                margin-bottom: 25px;
            }
            .about-box {
                padding: 25px 20px;
                margin-bottom: 50px;
            }
            .card-grid {
                grid-template-columns: 1fr; /* リンクボタンを縦1列にする */
                gap: 20px;
            }
            .card {
                padding: 25px 20px;
                min-height: 80px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

    </div>

</body>
</html>
